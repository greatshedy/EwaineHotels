                - paragraph [ref=e852]: Flawless stay
                - paragraph [ref=e853]: "Just spent 3 nights at caritas inn lekkj and honestly, it exceeded expectations.<br /><br />*Room &amp; Comfort*: The room was spotless, modern, and way quieter than I expected for a downtown spot. Bed was cloud-level comfy, AC worked perfectly, and the blackout curtains actually meant blackout.<br /><br />*Service*: Staff were genuinely friendly without being over the top. Front desk sorted my late check-in in 2 minutes and the housekeeping team was discreet and thorough. Felt taken care of the whole time."
